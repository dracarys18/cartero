[bot]
name = "cartero"
interval = "10m"
run_once = false

[storage]
# SQLite (default)
type = "sqlite"
path = "./cartero.db"

# Postgres
# type = "postgres"
# dsn  = "postgres://cartero:cartero@localhost:5432/cartero?sslmode=disable"

[platforms.ollama]
type = "ollama"
[platforms.ollama.settings]
embedding_model = "embeddinggemma:300m"

# OpenAI-compatible embedding API (Cloudflare Workers AI, OpenAI, Together, etc.)
[platforms.cloudflare]
type = "openai"
enabled = false
[platforms.cloudflare.settings]
embedding_model = "@cf/baai/bge-m3"
base_url = "https://api.cloudflare.com/client/v4/accounts/YOUR_ACCOUNT/ai/v1"
api_key = "YOUR_CF_API_TOKEN"

[platforms.discord]
type = "discord"
sleep = "1s"
[platforms.discord.settings]
bot_token = "YOUR_BOT_TOKEN_HERE"
timeout = "60s"

[platforms.bluesky]
type = "bluesky"
enabled = false
[platforms.bluesky.settings]
identifier = "your-handle.bsky.social"
password = "your-app-password"

[platforms.telegram]
type = "telegram"
enabled = false
[platforms.telegram.settings]
tg_bot_token = "YOUR_TELEGRAM_BOT_TOKEN_HERE"

[sources.hackernews]
type = "hackernews"
enabled = true
targets = ["discord_hn"]
[sources.hackernews.settings]
story_type = "topstories"
max_items = 30

[sources.lobsters]
type = "lobsters"
enabled = false
targets = ["discord_lobsters"]
[sources.lobsters.settings]
max_items = 20
sort_by = "hot"
include_categories = ["rust", "go", "programming"]
exclude_categories = ["rant", "culture"]

[sources.rss_example]
type = "rss"
enabled = false
targets = ["discord_rss"]
[sources.rss_example.settings]
feed_url = "https://example.com/feed.xml"
max_items = 20

[sources.lesswrong]
type = "lesswrong"
enabled = false
targets = ["discord_lw"]
[sources.lesswrong.settings]
max_items = 20

[sources.scraper_internal]
type = "scraper"
enabled = false
targets = ["feed_target"]
[sources.scraper_internal.settings]
scraper_type = "internal"
scraper_name = "techcrunch"
max_items = 20
[sources.scraper_internal.settings.config]

[sources.scraper_external]
type = "scraper"
enabled = false
targets = ["feed_target"]
[sources.scraper_external.settings]
scraper_type = "external"
script_path = "./scripts/custom_scraper.lua"
max_items = 20
[sources.scraper_external.settings.config]
custom_param = "value"

[processors.dedupe]
type = "dedupe"
enabled = true
[processors.dedupe.settings]
ttl = "24h"

# Semantic dedup: rejects items with embeddings too similar to existing ones
# Must run after embed_text. Uses DedupeSettings for threshold/window.
[processors.embed_dedupe]
type = "embed_dedupe"
enabled = false
[processors.embed_dedupe.settings]
embed_threshold = 0.9
embed_window = "168h"

[processors.score_filter]
type = "filter_score"
enabled = true
order = 2
[processors.score_filter.settings]
min_score = 100

[processors.extract_text]
type = "extract_text"
enabled = false
[processors.extract_text.settings]
min_content_length = 100

[processors.embed]
type = "embed_text"
enabled = false
[processors.embed.settings]
chunk_size = 7000

[processors.keyword_filter]
type = "filter_keyword"
enabled = false
[processors.keyword_filter.settings]
keywords_file = "assets/keywords/my_keywords.json"
embed_threshold = 0.6

[processors.rate_limiter]
type = "rate_limit"
enabled = false
order = 4
[processors.rate_limiter.settings]
limit = 10
window = "1m"

[targets.discord_hn]
type = "discord"
enabled = true
platform = "discord"
[targets.discord_hn.settings]
channel_id = "YOUR_CHANNEL_ID_HERE"
channel_type = "forum"

[targets.discord_lobsters]
type = "discord"
enabled = true
platform = "discord"
[targets.discord_lobsters.settings]
channel_id = "YOUR_CHANNEL_ID_HERE"
channel_type = "forum"

[targets.discord_rss]
type = "discord"
enabled = false
platform = "discord"
[targets.discord_rss.settings]
channel_id = "YOUR_CHANNEL_ID_HERE"
channel_type = "text"

[targets.bluesky_example]
type = "bluesky"
enabled = false
platform = "bluesky"
[targets.bluesky_example.settings]
languages = ["en"]

[targets.telegram_hn]
type = "telegram"
enabled = false
platform = "telegram"
[targets.telegram_hn.settings]
chat_id = -1001234567890

[targets.feed_target]
type = "feed"
enabled = true
[targets.feed_target.settings]
port = "8080"
feed_size = 100
max_items = 50
