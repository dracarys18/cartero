services:
  cartero:
    image: ghcr.io/dracarys18/cartero:latest
    container_name: cartero
    restart: unless-stopped
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./keywords.txt:/app/keywords.txt:ro
      - cartero-data:/app/data
    environment:
      - TZ=UTC
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8034:8080"
    command: ["-config", "/app/config.toml"]
    networks:
      - cartero-network

  diun:
    image: crazymax/diun:latest
    container_name: diun
    restart: unless-stopped
    command: serve
    volumes:
      - diun-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=UTC
      - LOG_LEVEL=info
      - LOG_JSON=false
      - DIUN_WATCH_WORKERS=20
      - DIUN_WATCH_SCHEDULE=0 */5 * * *
      - DIUN_WATCH_JITTER=30s
      - DIUN_PROVIDERS_DOCKER=true
      - DIUN_PROVIDERS_DOCKER_WATCHSTOPPED=false
    labels:
      - diun.enable=true
    networks:
      - cartero-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - cartero-network
    profiles:
      - tunnel

networks:
  cartero-network:
    driver: bridge

volumes:
  cartero-data:
    driver: local
  diun-data:
    driver: local
