services:
  redis:
    image: redis/redis-stack:latest
    container_name: cartero-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cartero-network

  postgres:
    image: pgvector/pgvector:pg17
    container_name: cartero-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cartero
      POSTGRES_PASSWORD: cartero
      POSTGRES_DB: cartero
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartero"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cartero-network

  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.9
    container_name: cartero-reranker
    restart: unless-stopped
    command: ["--model-id", "BAAI/bge-reranker-base"]
    ports:
      - "8081:80"
    volumes:
      - tei-data:/data
    pull_policy: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - cartero-network

  cartero:
    image: ghcr.io/dracarys18/cartero:latest
    container_name: cartero
    restart: unless-stopped
    depends_on:
      - redis
      - reranker
    volumes:
      - ./config.toml:/app/config.toml:ro
      - cartero-data:/app/data
    environment:
      - TZ=UTC
      - OLLAMA_HOST=http://host.docker.internal:11434
      - CARTERO_QUEUE_PREFIX=cartero
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8034:8080"
    command: ["-config", "/app/config.toml"]
    networks:
      - cartero-network

  diun:
    image: crazymax/diun:latest
    container_name: diun
    restart: unless-stopped
    command: serve
    volumes:
      - diun-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=UTC
      - LOG_LEVEL=info
      - LOG_JSON=false
      - DIUN_WATCH_WORKERS=20
      - DIUN_WATCH_SCHEDULE=0 */5 * * *
      - DIUN_WATCH_JITTER=30s
      - DIUN_PROVIDERS_DOCKER=true
      - DIUN_PROVIDERS_DOCKER_WATCHSTOPPED=false
    labels:
      - diun.enable=true
    networks:
      - cartero-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - cartero-network
    profiles:
      - tunnel

networks:
  cartero-network:
    driver: bridge

volumes:
  cartero-data:
    driver: local
  diun-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  tei-data:
    driver: local
